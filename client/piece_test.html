<!DOCTYPE html>
<html>
<head>
    <title>Piece Rendering Test</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="info">
        <h3>Piece Rendering Test</h3>
        <div id="status">Loading...</div>
        <div id="pieces">Pieces: 0</div>
    </div>
    
    <script src="three.min.js"></script>
    <script src="socket.io.min.js"></script>
    <script>
        let scene, camera, renderer;
        const pieces = new Map();
        
        function init() {
            // Basic Three.js setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 10);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            
            // Basic lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 10, 5);
            scene.add(directionalLight);
            
            // Add a simple ground plane
            const planeGeometry = new THREE.PlaneGeometry(50, 50);
            const planeMaterial = new THREE.MeshBasicMaterial({ color: 0x90EE90 });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.rotation.x = -Math.PI / 2;
            scene.add(plane);
            
            // Add grid helper
            const gridHelper = new THREE.GridHelper(50, 50);
            scene.add(gridHelper);
            
            document.getElementById('status').textContent = '3D scene initialized';
            
            // Start animation loop
            animate();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        
        function createPiece(pieceData) {
            // Simple piece representation - just a colored cube
            const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const material = new THREE.MeshBasicMaterial({ 
                color: pieceData.color === 'white' ? 0xffffff : 
                       pieceData.color === 'black' ? 0x333333 :
                       pieceData.color === 'red' ? 0xff0000 :
                       pieceData.color === 'blue' ? 0x0000ff :
                       pieceData.color === 'green' ? 0x00ff00 :
                       pieceData.color === 'yellow' ? 0xffff00 : 0x888888
            });
            
            const piece = new THREE.Mesh(geometry, material);
            // Use same positioning as main game - center of square
            piece.position.set(pieceData.x + 0.5, 0.25, pieceData.z + 0.5);
            
            scene.add(piece);
            pieces.set(pieceData.id, piece);
            
            document.getElementById('pieces').textContent = 'Pieces: ' + pieces.size;
            
            console.log('Created piece:', pieceData.type, 'at', pieceData.x, pieceData.z);
        }
        
        // Connect to server
        const socket = io('http://localhost:3000');
        
        socket.on('connect', () => {
            console.log('Connected to server');
            document.getElementById('status').textContent = 'Connected to server';
            
            socket.emit('joinGame', {
                name: 'Piece Test Player',
                color: 'blue'
            });
        });
        
        socket.on('gameState', (data) => {
            console.log('Game state received:', data.pieces?.length || 0, 'pieces');
            document.getElementById('status').textContent = 'Game state received';
            
            if (data.pieces) {
                data.pieces.forEach(pieceData => {
                    createPiece(pieceData);
                });
            }
        });
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Initialize Three.js
        init();
    </script>
</body>
</html>
