<!DOCTYPE html>
<html>
<head>
    <title>Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .log { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffcccc; }
        .success { background: #ccffcc; }
        .warning { background: #ffffcc; }
    </style>
</head>
<body>
    <h1>Socket.IO Connection Test</h1>
    <div id="log"></div>
    
    <script src="socket.io.min.js"></script>
    <script>
        const logDiv = document.getElementById('log');
        
        function log(message, type = 'log') {
            console.log(message);
            const div = document.createElement('div');
            div.className = 'log ' + type;
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            logDiv.appendChild(div);
        }
        
        log('Starting connection test...');
        
        // Test 1: Check if Socket.IO loaded
        if (typeof io === 'undefined') {
            log('ERROR: Socket.IO not loaded', 'error');
        } else {
            log('SUCCESS: Socket.IO loaded', 'success');
        }
        
        // Test 2: Try different connection URLs
        const urls = [
            'http://localhost:3000',
            'http://127.0.0.1:3000',
            'ws://localhost:3000',
            undefined // Default
        ];
        
        let currentUrlIndex = 0;
        
        function testConnection(url) {
            log(`Testing connection to: ${url || 'default'}`, 'warning');
            
            const socket = io(url, {
                transports: ['websocket', 'polling'],
                timeout: 5000,
                forceNew: true
            });
            
            let connected = false;
            
            socket.on('connect', () => {
                connected = true;
                log(`SUCCESS: Connected to ${url || 'default'}`, 'success');
                socket.disconnect();
                
                if (currentUrlIndex < urls.length - 1) {
                    currentUrlIndex++;
                    setTimeout(() => testConnection(urls[currentUrlIndex]), 1000);
                } else {
                    log('Connection testing complete!', 'success');
                }
            });
            
            socket.on('connect_error', (error) => {
                if (!connected) {
                    log(`ERROR: Failed to connect to ${url || 'default'} - ${error.message}`, 'error');
                    socket.disconnect();
                    
                    if (currentUrlIndex < urls.length - 1) {
                        currentUrlIndex++;
                        setTimeout(() => testConnection(urls[currentUrlIndex]), 1000);
                    } else {
                        log('All connection attempts failed!', 'error');
                    }
                }
            });
            
            // Timeout
            setTimeout(() => {
                if (!connected) {
                    log(`TIMEOUT: No response from ${url || 'default'}`, 'error');
                    socket.disconnect();
                    
                    if (currentUrlIndex < urls.length - 1) {
                        currentUrlIndex++;
                        setTimeout(() => testConnection(urls[currentUrlIndex]), 1000);
                    } else {
                        log('All connection attempts failed!', 'error');
                    }
                }
            }, 6000);
        }
        
        // Start testing
        testConnection(urls[currentUrlIndex]);
    </script>
</body>
</html>
